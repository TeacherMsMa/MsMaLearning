uilds one event at a time.",accent:"#66e3ff",graphic:"sequence",shuffleQuestions:!1,questions:[{id:"car-1",prompt:"Shafi has saved for a good car. What happens first?",stem:"Start the timeline.",options:["Shafi buys the bright red car.","The police call Shafi\u2019s workplace.","Rooksby offers Gemma a lift."],correct:"Shafi buys the bright red car.",hint:"Look for the event that starts the whole problem.",feedback:"Buying the car begins the plot and gives Shafi something important to lose.",subskill:"Opening events"},{id:"car-2",prompt:"Shafi has bought the car. What happens next?",stem:"Event 2 of 8",options:["He drives to Gemma\u2019s house to show her.","He reports the car missing.","He leaves the car in Birmingham."],correct:"He drives to Gemma\u2019s house to show her.",hint:"Who has been encouraging Shafi to get a car?",feedback:"Shafi visits Gemma because he expects her to be impressed by his new car.",subskill:"Opening events"},{id:"car-3",prompt:"Gemma suggests going to Sawby. What happens next?",stem:"Event 3 of 8",options:["They take the motorway and Shafi drives very fast.","They wait two weeks for the police.","They return the car to the showroom."],correct:"They take the motorway and Shafi drives very fast.",hint:"Shafi wants to test what his new car can do.",feedback:"The motorway journey shows Shafi\u2019s excitement and introduces risky driving.",subskill:"Rising action"},{id:"car-4",prompt:"Shafi parks opposite the club. What happens inside?",stem:"Event 4 of 8",options:["Rooksby sees the car and insults Shafi.","A police officer returns Shafi\u2019s keys.","Gemma buys a different car."],correct:"Rooksby sees the car and insults Shafi.",hint:"Think about Gemma\u2019s former boyfriend.",feedback:"Rooksby\u2019s jealousy and sarcastic comments increase tension before the theft.",subskill:"Rising action"},{id:"car-5",prompt:"Shafi and Gemma leave the club at about 3 a.m. What do they discover?",stem:"Event 5 of 8",options:["The car and Shafi\u2019s keys are missing.","Jess has cleaned the car.","The showroom has closed."],correct:"The car and Shafi\u2019s keys are missing.",hint:"This is the main complication in the story.",feedback:"The missing car changes Shafi\u2019s excitement into panic and drives the rest of the plot.",subskill:"Complication"},{id:"car-6",prompt:"While Shafi searches for his keys, what happens?",stem:"Event 6 of 8",options:["A red car roars past them and disappears.","He finds the keys under a table.","Gemma calls the showroom."],correct:"A red car roars past them and disappears.",hint:"Shafi briefly sees what he has just lost.",feedback:"Seeing the car speed away confirms the theft and makes the moment more dramatic.",subskill:"Complication"},{id:"car-7",prompt:"Shafi cannot drive Gemma home. What happens next?",stem:"Event 7 of 8",options:["Gemma accepts Rooksby\u2019s offer of a lift.","Shafi finds a spare car in the club.","Rooksby calls the police for Shafi."],correct:"Gemma accepts Rooksby\u2019s offer of a lift.",hint:"Rooksby says he has room for only one person.",feedback:"Gemma leaves with Rooksby, which adds suspicion and leaves Shafi alone with the loss.",subskill:"Consequences"},{id:"car-8",prompt:"Two weeks later, the police call. What is revealed?",stem:"Complete the timeline.",options:["The car is a write-off after a fatal crash, and the passenger wants to see Shafi.","The car is undamaged and ready to collect.","Rooksby bought the car from the police."],correct:"The car is a write-off after a fatal crash, and the passenger wants to see Shafi.",hint:"The ending creates a mystery rather than solving everything.",feedback:"The crash and unnamed passenger form the final twist and leave the reader with questions.",subskill:"Ending"}]},{id:"grammar-surgery",title:"Grammar Surgery",shortTitle:"Grammar Surgery",year:"Year 8 English",skill:"Repair",action:"Diagnose and repair",kicker:"Eight sentences need help",instructions:"Choose the clearest, most accurate repair. Look closely: some options fix one error but create another.",accent:"#ff6b5e",graphic:"grammar",shuffleQuestions:!0,questions:[{id:"grammar-1",prompt:"Repair the sentence fragment.",stem:"Because the storm was getting closer.",options:["Because the storm was getting closer, we went inside.","The storm. Was getting closer, we went inside.","Because the storm, getting closer and inside."],correct:"Because the storm was getting closer, we went inside.",hint:"A complete sentence needs an independent main clause.",feedback:"The added main clause completes the thought, and the comma separates the opening dependent clause.",subskill:"Sentence boundaries"},{id:"grammar-2",prompt:"Repair the run-on sentence.",stem:"Mia opened the door, the room was empty.",options:["Mia opened the door, but the room was empty.","Mia opened the door the room, was empty.","Mia, opened the door but the room was empty."],correct:"Mia opened the door, but the room was empty.",hint:"Join the two complete ideas with a coordinating conjunction.",feedback:"The comma plus \u2018but\u2019 correctly joins two complete ideas and shows contrast.",subskill:"Sentence boundaries"},{id:"grammar-3",prompt:"Fix the subject\u2013verb agreement.",stem:"The group of students are waiting outside.",options:["The group of students is waiting outside.","The group of students were waits outside.","The group of students be waiting outside."],correct:"The group of students is waiting outside.",hint:"The main subject is \u2018group\u2019, not \u2018students\u2019.",feedback:"\u2018Group\u2019 is the singular subject, so it agrees with the singular verb \u2018is\u2019.",subskill:"Agreement"},{id:"grammar-4",prompt:"Show that the collar belongs to one dog.",stem:"The dogs collar was bright blue.",options:["The dog\u2019s collar was bright blue.","The dogs\u2019 collar was bright blue.","The dogs collar, was bright blue."],correct:"The dog\u2019s collar was bright blue.",hint:"One dog owns the collar.",feedback:"The apostrophe before the \u2018s\u2019 shows singular possession: one dog\u2019s collar.",subskill:"Apostrophes"},{id:"grammar-5",prompt:"Keep the verb tense consistent.",stem:"Leo ran across the court and grabs the ball.",options:["Leo ran across the court and grabbed the ball.","Leo runs across the court and grabbed the ball.","Leo running across the court and grabs the ball."],correct:"Leo ran across the court and grabbed the ball.",hint:"The first verb is in the past tense.",feedback:"Both actions now use past tense: \u2018ran\u2019 and \u2018grabbed\u2019.",subskill:"Verb tense"},{id:"grammar-6",prompt:"Choose the correct homophone.",stem:"Their going to present they\u2019re project over there.",options:["They\u2019re going to present their project over there.","Their going to present there project over they\u2019re.","There going to present they\u2019re project over their."],correct:"They\u2019re going to present their project over there.",hint:"Use \u2018they are\u2019, ownership, then place\u2014in that order.",feedback:"\u2018They\u2019re\u2019 means they are, \u2018their\u2019 shows ownership, and \u2018there\u2019 refers to a place.",subskill:"Word choice"},{id:"grammar-7",prompt:"Choose the standard subject pronouns.",stem:"Me and Jay finished the experiment.",options:["Jay and I finished the experiment.","Jay and me finished the experiment.","I and Jay finishes the experiment."],correct:"Jay and I finished the experiment.",hint:"Remove \u2018Jay and\u2019. Would you say \u2018Me finished\u2019 or \u2018I finished\u2019?",feedback:"\u2018Jay and I\u2019 is the compound subject, so the subject pronoun \u2018I\u2019 is needed.",subskill:"Pronouns"},{id:"grammar-8",prompt:"Punctuate the dialogue correctly.",stem:"Keep going the coach said.",options:["\u201CKeep going,\u201D the coach said.","\u201CKeep going\u201D the coach, said.","Keep going, \u201Cthe coach said.\u201D"],correct:"\u201CKeep going,\u201D the coach said.",hint:"Put the spoken words inside quotation marks and the comma before the closing mark.",feedback:"The spoken words are enclosed in quotation marks, with the comma attached to the dialogue.",subskill:"Punctuation"}]},{id:"reflection-recount",title:"Reflection or Recount?",shortTitle:"Reflection or Recount?",year:"Year 9 English",skill:"Sort",action:"Look beneath the event",kicker:"What makes writing reflective?",instructions:"Decide whether each sentence only tells what happened or reveals thinking, learning or change.",accent:"#b985ff",graphic:"reflection",shuffleQuestions:!0,questions:[{id:"reflect-1",prompt:"Sort this sentence.",stem:"First, we arrived at the camp at 9 a.m.",options:["Recount","Reflection"],correct:"Recount",hint:"Does the sentence explain thinking, or only record an event?",feedback:"It gives the time and action, but it does not explore a feeling, judgement or lesson.",subskill:"Identify recount"},{id:"reflect-2",prompt:"Sort this sentence.",stem:"I realised my frustration came from being afraid of making a mistake.",options:["Recount","Reflection"],correct:"Reflection",hint:"Look for a new understanding of an emotion.",feedback:"The writer analyses the cause of a feeling, which adds reflective depth.",subskill:"Identify reflection"},{id:"reflect-3",prompt:"Sort this sentence.",stem:"We collected the equipment and walked to the oval.",options:["Reflection","Recount"],correct:"Recount",hint:"This sentence reports two actions in order.",feedback:"The sentence tells what happened but does not evaluate or interpret the experience.",subskill:"Identify recount"},{id:"reflect-4",prompt:"Sort this sentence.",stem:"Although our plan failed, the experience taught me to ask for feedback earlier.",options:["Reflection","Recount"],correct:"Reflection",hint:"Find the lesson that could change a future action.",feedback:"The writer evaluates the experience and identifies learning for the future.",subskill:"Identify reflection"},{id:"reflect-5",prompt:"Which sentence is genuinely reflective?",stem:"Choose the response with analysis, not just extra detail.",options:["The presentation lasted six minutes and had eight slides.","Presenting too much information showed me that clarity matters more than quantity."],correct:"Presenting too much information showed me that clarity matters more than quantity.",hint:"Reflection explains what the event means.",feedback:"The second sentence connects the experience to a broader understanding about effective communication.",subskill:"Depth"},{id:"reflect-6",prompt:"Which sentence moves from feeling to analysis?",stem:"Choose the deeper response.",options:["I felt nervous before I spoke.","My nervousness revealed that I had prepared the words but not practised delivering them."],correct:"My nervousness revealed that I had prepared the words but not practised delivering them.",hint:"Naming a feeling is a start; explaining its cause goes deeper.",feedback:"The writer uses the feeling as evidence and analyses why it occurred.",subskill:"Depth"},{id:"reflect-7",prompt:"Which sentence includes an action plan?",stem:"Choose the sentence that uses learning to guide a next step.",options:["Next time, I will rehearse with a timer and ask a peer to check my pace.","After that, I sat down and watched the next presentation."],correct:"Next time, I will rehearse with a timer and ask a peer to check my pace.",hint:"An action plan is specific and future-focused.",feedback:"The response turns learning into two concrete strategies for improvement.",subskill:"Future action"},{id:"reflect-8",prompt:"Which revision best transforms recount into reflection?",stem:"Original: \u2018Our group disagreed about the design.\u2019",options:["Our group disagreed about the design for ten minutes.","The disagreement showed me that I was defending my idea before listening to others.","Our group had four people and three design ideas."],correct:"The disagreement showed me that I was defending my idea before listening to others.",hint:"Choose the sentence that explains what the wr
